name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DMG
        run: ./script/build_dmg.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/Study Tracker-0.1.dmg" \
            --title "Study Tracker ${GITHUB_REF_NAME}" \
            --notes "Initial Study Tracker macOS release."
